<html>
    <body>
        <h2>Redeclaring a Variable using let</h2>

        <p id = "1"></p>

        <script>
            let x = 10;  //Here the value of x is 10

            {
                let x = 5; //Here the value of x is 5
            }

            document.getElementById("1").innerHTML = x;
        </script>
    </body>
</html>
