<html>
    <body>
        <h1>JavaScript Variables</h1>
        <p>const is a keyword used to declare a variable whose value cannot be reassigned after it is initialized.</p>
        <p id = "1"></p>
        <script>
            const x = 5;
            const y = 4;
            const z = x + y;

            document.getElementById("1").innerHTML = z;
        </script>
    </body>
</html>
