<html>
    <body>
        <h1>Do...While Loop</h1>

        <p id = "1"></p>

        <script>
            let text = ""
            let i = 0;

            do{
                text += "<br> The number is " +i;
                i++;
            }
            while (i < 10);

            document.getElementById("1").innerHTML = text;
        </script>
    </body>
</html>
