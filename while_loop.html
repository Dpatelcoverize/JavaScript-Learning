<html>
    <body>
        <h1>WHILE LOOP</h1>

        <p id = "1"></p>

        <script>
            let text = "";

            let i = 0;
            while (i < 10){
                text += "The number is " + i + "<br>";
            i ++;
            }
            document.getElementById("1").innerHTML = text;
        </script>
    </body>
</html>
