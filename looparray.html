<html>
    <body>
        <h1>LOOP THROUGH AN ARRAY</h1>

        <p id = "1"></p>

        <script>
            let fruits = ["Apple", "Mango", "Banana"];
            let text = "";

            for (let i = 0; i <fruits.length; i++){
                text += fruits[i] + "<br>";
            }

            document.getElementById("1").innerHTML = text;
        </script>
    </body>
</html>
