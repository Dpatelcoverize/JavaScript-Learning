<html>
    <body>
        Enter your name : <input type = "text" id = "name">
        <button onclick = "showName()">SUBMIT</button>

        <p id = "1"></p>

        <script>
            function showName(){
                let userName = document.getElementById("name").value;
                document.getElementById("1").innerHTML = "Hello " + userName + " !!";
            }
        </script>
    </body>
</html>
