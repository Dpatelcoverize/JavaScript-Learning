<html>
    <body>
        Enter number 1 : <input type = "number" id = "num1"> <br><br>
        Enter number 2 : <input type = "number" id = "num2"> <br><br>

        <button onclick = "addNumbers()">ADD</button>

        <p id = "1"></p>

        <script>
            function addNumbers(){
                let a = Number(document.getElementById("num1").value);
                let b = Number(document.getElementById("num2").value);

                let sum = a + b;

                document.getElementById("1").innerHTML = "SUM = " + sum;
            }
        </script>
    </body>
</html>
