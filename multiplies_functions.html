<html>
    <body>
        <h1>JavaScript Functions</h1>
        <p>A function that multiplies two numbers</p>

        <p id = "1"></p>

        <script>
            function multiply(a,b) {
                return a * b;
            }
            let result = multiply(4,3);

            document.getElementById("1").innerHTML = "The result is " + result;
        </script>
    </body>
</html>
